[cache]
localhost =127.0.0.1
port = 6379
db = 15
[mysql]
localhost =127.0.0.1
port=3306
user=root
database=edurag
# ===== LLM 大模型配置（原千问 → 改为小米 mimo）=====
[llm]
# 模型名：deepseek-v4-flash
model =gemma-4-31b-it
model_embedding=gemini-embedding-001


base_url =https://generativelanguage.googleapis.com/v1beta/openai/
# ===== 检索参数配置 =====
[retrieval]
# 父块大小（字符数），切得粗，给大模型当上下文
parent_chunk_size= 512
# 子块大小（字符数），切得细，用于精确检索
child_chunk_size= 128
# 相邻块之间的重叠字符数，防止把一句话从中间切断丢信息
chunk_overlap= 50
# 检索返回数量：最终返回几个结果
retrieval_k= 3
# 候选数量：初步召回几个候选再去重排
candidate_m= 2


[milvus]
collection_name=loader_rag
host=127.0.0.1
port=19530
database=edurag
